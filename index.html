<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Notepad V2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div class="app-shell">
    <aside class="sidebar glass">
      <div class="brand-row">
        <div>
          <p class="eyebrow">PRODUCTIVITY</p>
          <h1>Premium Notepad</h1>
        </div>
        <button id="newNoteBtn" class="primary-btn">+ New</button>
      </div>

      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search notes..." />
      </div>

      <div class="sidebar-meta">
        <span id="noteCount">0 notes</span>
        <span>Local autosave</span>
      </div>

      <div id="notesList" class="notes-list"></div>
    </aside>

    <main class="editor glass">
      <div class="editor-top">
        <div class="title-wrap">
          <input type="text" id="noteTitle" placeholder="Untitled note" maxlength="120" />
          <div class="date-row">
            <span id="createdAt">Created: --</span>
            <span id="updatedAt">Updated: --</span>
          </div>
        </div>

        <div class="action-row">
          <button id="pinNoteBtn" class="icon-btn" title="Pin note">📌</button>
          <button id="duplicateNoteBtn" class="icon-btn" title="Duplicate note">⧉</button>
          <button id="downloadNoteBtn" class="icon-btn" title="Download note">⬇</button>
          <button id="clearNoteBtn" class="icon-btn warn" title="Clear note">⌫</button>
          <button id="deleteNoteBtn" class="danger-btn" title="Delete note">Delete</button>
        </div>
      </div>

      <div class="editor-body">
        <textarea id="noteContent" placeholder="Start writing something beautiful..."></textarea>
      </div>

      <div class="editor-footer">
        <div class="stats">
          <span id="wordCount">0 words</span>
          <span id="charCount">0 characters</span>
        </div>
        <div class="status-wrap">
          <span class="shortcut-hint">Tip: Ctrl/Cmd + N to create a note</span>
          <span id="saveStatus">Ready</span>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast">Saved successfully</div>

  <script src="script.js"></script>
</body>
</html>
